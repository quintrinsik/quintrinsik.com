<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quintrinsik — Coming soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;600;800;900&family=Onest:wght@400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --voltage:#2D5BFF;--brass:#FFB81C;--signal:#FF4D8D;--mint:#06D6A0;
    --violet:#8B5CF6;--ink:#141225;--bone:#FAF6EC;--deep:#21185A;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;color:var(--bone);
    font-family:"Onest",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:
      radial-gradient(120% 90% at 80% 12%, rgba(45,91,255,.28), transparent 58%),
      radial-gradient(90% 80% at 8% 96%, rgba(255,77,141,.18), transparent 55%),
      radial-gradient(70% 60% at 50% 110%, rgba(6,214,160,.14), transparent 60%),
      linear-gradient(165deg,var(--deep),var(--ink) 72%);
    min-height:100%;display:flex;flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  .top,.foot{font-family:"Geist Mono",monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,246,236,.55)}
  .top{display:flex;justify-content:space-between;align-items:center;padding:26px 30px}
  .badge{display:flex;align-items:center;gap:10px}
  .badge svg{width:26px;height:26px}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 26px 50px}
  .mark{width:128px;height:128px;filter:drop-shadow(0 16px 46px rgba(45,91,255,.5));animation:settle .9s cubic-bezier(.2,.8,.2,1) both;transform-origin:50% 50%}
  .eyebrow{font-family:"Geist Mono",monospace;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);margin:34px 0 0}
  h1{font-family:"Gabarito",sans-serif;font-weight:900;letter-spacing:-.035em;line-height:.94;
    font-size:clamp(40px,9vw,86px);margin:14px 0 0;max-width:14ch}
  h1 .pop{color:var(--signal)}
  .sub{font-size:clamp(15px,2.5vw,19px);color:rgba(250,246,236,.78);max-width:46ch;margin:20px 0 0}
  .platforms{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:30px}
  .pill{font-family:"Geist Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:9px 15px;border-radius:999px;border:1px solid rgba(250,246,236,.22);color:rgba(250,246,236,.85);display:flex;gap:8px;align-items:center}
  .pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--mint)}
  .cta{margin-top:38px;display:flex;flex-direction:column;align-items:center;gap:14px}
  a.notify{
    font-family:"Gabarito",sans-serif;font-weight:800;font-size:16px;letter-spacing:-.01em;
    text-decoration:none;color:var(--ink);background:var(--brass);
    padding:15px 26px;border-radius:14px;transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 10px 30px rgba(255,184,28,.28);
  }
  a.notify:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(255,184,28,.4)}
  a.notify:focus-visible{outline:3px solid var(--bone);outline-offset:3px}
  .contact{font-size:13.5px;color:rgba(250,246,236,.6)}
  .contact a{color:var(--mint);text-decoration:none;border-bottom:1px solid rgba(6,214,160,.4)}
  .contact a:hover{color:var(--bone)}
  .foot{text-align:center;padding:24px;color:rgba(250,246,236,.4)}
  @keyframes settle{from{opacity:0;transform:rotate(-58deg) scale(.7)}to{opacity:1;transform:rotate(0) scale(1)}}
  @media (prefers-reduced-motion:reduce){.mark{animation:none}}
</style>
</head>
<body>

<!-- mark defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <path id="qk-blade" d="M57.5,37 L72,11.9 A44,44 0 0 1 28,11.9 L42.5,37 A15,15 0 0 0 57.5,37 Z"/>
  <g id="qk-spectrum">
    <use href="#qk-blade" fill="var(--voltage)"/>
    <use href="#qk-blade" fill="var(--mint)"   transform="rotate(72 50 50)"/>
    <use href="#qk-blade" fill="var(--brass)"  transform="rotate(144 50 50)"/>
    <use href="#qk-blade" fill="var(--signal)" transform="rotate(216 50 50)"/>
    <use href="#qk-blade" fill="var(--violet)" transform="rotate(288 50 50)"/>
    <circle cx="50" cy="50" r="12.5" fill="var(--bone)"/>
    <circle cx="50" cy="50" r="5.4"  fill="var(--brass)"/>
  </g>
  <g id="qk-rev">
    <use href="#qk-blade" fill="var(--bone)"/>
    <use href="#qk-blade" fill="var(--bone)" transform="rotate(72 50 50)"/>
    <use href="#qk-blade" fill="var(--bone)" transform="rotate(144 50 50)"/>
    <use href="#qk-blade" fill="var(--bone)" transform="rotate(216 50 50)"/>
    <use href="#qk-blade" fill="var(--bone)" transform="rotate(288 50 50)"/>
    <circle cx="50" cy="50" r="12.5" fill="var(--voltage)"/>
    <circle cx="50" cy="50" r="5.4"  fill="var(--brass)"/>
  </g>
</defs></svg>

<div class="top">
  <span class="badge"><svg viewBox="0 0 100 100" aria-hidden="true"><use href="#qk-rev"/></svg> Quintrinsik</span>
  <span>Est. 2026</span>
</div>

<main>
  <svg class="mark" viewBox="0 0 100 100" role="img" aria-label="Quintrinsik"><use href="#qk-spectrum"/></svg>
  <p class="eyebrow">Five facets · one core</p>
  <h1>Coming soon to a phone <span class="pop">near you</span>.</h1>
  <p class="sub">A brighter kind of personal productivity, almost ready for your pocket.</p>

  <div class="platforms">
    <span class="pill">iOS</span>
    <span class="pill">Android</span>
  </div>

  <div class="cta">
    <a class="notify" id="notify" href="#">Tell me when it's live</a>
    <p class="contact">Questions? <a id="email" href="#"><span class="fallback">info&nbsp;[at]&nbsp;intrinsik&nbsp;[dot]&nbsp;com</span></a></p>
  </div>
</main>

<div class="foot">quintrinsik · 2026</div>

<script>
  // Anti-scrape: assemble the address at runtime so the raw string is never in the page source.
  (function(){
    var user = "info";
    var domain = ["intrinsik", "com"].join(".");
    var addr = user + String.fromCharCode(64) + domain; // 64 = "@"
    var link = document.getElementById("email");
    if(link){ link.href = "mailto:" + addr; link.textContent = addr; }
    var notify = document.getElementById("notify");
    if(notify){
      notify.href = "mailto:" + addr +
        "?subject=" + encodeURIComponent("Notify me when Quintrinsik launches");
    }
  })();
</script>

</body>
</html>
